<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PERSONALIZE: Altere o título da página -->
  <title>For you &lt;3</title>

  <!-- PERSONALIZE: Atualize o caminho/nome do favicon se necessário -->
  <link rel="icon" type="image/png" href="./assets/favicon.png" sizes="32x32">

  <!-- Link para a stylesheet - não altere a menos que renomeie style.css -->
  <link rel="stylesheet" href="style.css">

  <!-- PERSONALIZE: Você pode adicionar Google Fonts ou outros recursos aqui -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <!-- PERSONALIZE: Altere o texto do cabeçalho -->
      <h1>For you &lt;3</h1>

      <div class="shrink-close-icons">
        <!-- PERSONALIZE: Atualize os caminhos/nomes dos ícones conforme necessário -->
        <img src="./assets/shrink-icon.png" alt="Shrink Icon" class="shrink-icon" />
        <img src="./assets/close-icon.png" alt="Close Icon" class="shrink-icon" />
      </div>
    </header>

    <div class="inner-container">
      <!-- A imagem é carregada via CSS a partir da variável --image-path-content -->
      <div class="image-content"></div>

      <!-- PERSONALIZE: Altere o texto do botão -->
      <button id="main-button">Grow!</button>

      <!-- PERSONALIZE: Altere o texto da mensagem final -->
      <div class="final-message">Have a good day!</div>
    </div>
  </div>

  <!-- Link to your JavaScript - don't change unless you rename index.js -->
  <script src="index.js"></script>
</body>

</html>
